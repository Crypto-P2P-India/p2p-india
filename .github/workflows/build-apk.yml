name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/downloads/**'
  workflow_dispatch:

concurrency:
  group: build-android-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Verify Node.js version
        run: |
          node --version
          npm --version
          node -e "const major = Number(process.versions.node.split('.')[0]); if (major < 22) throw new Error('Node 22+ is required for Capacitor');"

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Java version
        run: |
          java -version
          javac -version
          javac -version 2>&1 | grep -q "17\." || { echo "JDK 17 is required for this Android build"; exit 1; }

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: |
          node --version
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Decode and verify keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'crypto-p2p' }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -e
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is empty."
            echo "Generate it locally with:  base64 -w 0 crypto-p2p.jks  (Linux)"
            echo "                       or: base64 -i crypto-p2p.jks | tr -d '\\n'  (macOS)"
            exit 1
          fi
          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "ERROR: ANDROID_KEYSTORE_PASSWORD secret is empty."
            echo "Add the exact password used when crypto-p2p.jks was created."
            exit 1
          fi
          if [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "ERROR: ANDROID_KEY_PASSWORD is empty and could not default to ANDROID_KEYSTORE_PASSWORD."
            exit 1
          fi
          echo "Using Android key alias: $ANDROID_KEY_ALIAS"
          mkdir -p android/app
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > android/app/crypto-p2p.jks
          ls -l android/app/crypto-p2p.jks
          HEADER=$(xxd -p -l 4 android/app/crypto-p2p.jks)
          echo "Keystore header bytes: $HEADER"
          case "$HEADER" in
            feedfeed*) echo "Detected JKS keystore." ;;
            3082*)     echo "Detected PKCS12 keystore." ;;
            *)
              echo "ERROR: Decoded file is not a valid JKS/PKCS12 keystore."
              echo "Re-encode your .jks file with no line wrapping and update the ANDROID_KEYSTORE_BASE64 secret:"
              echo "  base64 -w 0 crypto-p2p.jks | pbcopy   # or > keystore.b64"
              exit 1
              ;;
          esac
          echo "--- Aliases in keystore ---"
          if ! keytool -list -keystore android/app/crypto-p2p.jks -storepass "$ANDROID_KEYSTORE_PASSWORD" 2>&1; then
            echo "ERROR: Could not list keystore. The ANDROID_KEYSTORE_PASSWORD secret is wrong."
            exit 1
          fi
          echo "--- Verifying alias '$ANDROID_KEY_ALIAS' ---"
          if ! keytool -list -keystore android/app/crypto-p2p.jks \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              -alias "$ANDROID_KEY_ALIAS" 2>&1; then
            echo "ERROR: Alias '$ANDROID_KEY_ALIAS' not found in keystore (see aliases above)."
            echo "Update the ANDROID_KEY_ALIAS secret to match."
            exit 1
          fi
          echo "Keystore verified successfully."

      - name: Build signed APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'crypto-p2p' }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          export JAVA_HOME="${JAVA_HOME_17_X64:-$JAVA_HOME}"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          javac -version
          ./gradlew --version
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/crypto-p2p.jks \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Save built APK outside git workspace
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk /tmp/crypto-p2p.apk
          ls -lh /tmp/crypto-p2p.apk

      - name: Read app version
        id: version
        run: |
          VERSION=$(node -p "require('./public/app-version.json').version")
          SIZE_BYTES=$(stat -c%s /tmp/crypto-p2p.apk)
          SIZE_MB=$(awk "BEGIN {printf \"%.1f MB\", $SIZE_BYTES/1024/1024}")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE_MB"   >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"   >> "$GITHUB_OUTPUT"

      - name: Publish APK as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Crypto P2P ${{ steps.version.outputs.tag }}
          body: |
            Automated build of Crypto P2P Android APK.
            Version: ${{ steps.version.outputs.version }}
            Size: ${{ steps.version.outputs.size }}
          files: /tmp/crypto-p2p.apk
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update app-version.json with release URL & size
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          SIZE="${{ steps.version.outputs.size }}"
          REPO="${{ github.repository }}"
          APK_URL="https://github.com/${REPO}/releases/download/v${VERSION}/crypto-p2p.apk"
          node -e "
            const fs = require('fs');
            const p = 'public/app-version.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.apkUrl = process.env.APK_URL;
            j.size = process.env.SIZE;
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "
          cat public/app-version.json
        env:
          APK_URL: https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/crypto-p2p.apk
          SIZE: ${{ steps.version.outputs.size }}

      - name: Commit updated version manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git stash push -u -- public/app-version.json || true
            git reset --hard origin/main
            git stash pop || true
            git add public/app-version.json
            if git diff --staged --quiet; then
              echo "No manifest changes"
              exit 0
            fi
            git commit -m "🤖 Auto-build: APK v${{ steps.version.outputs.version }} (${{ steps.version.outputs.size }})"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed, retrying ($i)..."
            sleep 3
          done
          echo "Push failed after retries" && exit 1

