name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/downloads/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Verify Node.js version
        run: |
          node --version
          npm --version
          node -e "const major = Number(process.versions.node.split('.')[0]); if (major < 22) throw new Error('Node 22+ is required for Capacitor');"

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Java version
        run: |
          java -version
          javac -version
          javac -version 2>&1 | grep -q "17\." || { echo "JDK 17 is required for this Android build"; exit 1; }

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: |
          node --version
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Decode and verify keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'crypto-p2p' }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -e
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is empty."
            echo "Generate it locally with:  base64 -w 0 crypto-p2p.jks  (Linux)"
            echo "                       or: base64 -i crypto-p2p.jks | tr -d '\\n'  (macOS)"
            exit 1
          fi
          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "ERROR: ANDROID_KEYSTORE_PASSWORD secret is empty."
            echo "Add the exact password used when crypto-p2p.jks was created."
            exit 1
          fi
          if [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "ERROR: ANDROID_KEY_PASSWORD is empty and could not default to ANDROID_KEYSTORE_PASSWORD."
            exit 1
          fi
          echo "Using Android key alias: $ANDROID_KEY_ALIAS"
          mkdir -p android/app
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > android/app/crypto-p2p.jks
          ls -l android/app/crypto-p2p.jks
          HEADER=$(xxd -p -l 4 android/app/crypto-p2p.jks)
          echo "Keystore header bytes: $HEADER"
          case "$HEADER" in
            feedfeed*) echo "Detected JKS keystore." ;;
            3082*)     echo "Detected PKCS12 keystore." ;;
            *)
              echo "ERROR: Decoded file is not a valid JKS/PKCS12 keystore."
              echo "Re-encode your .jks file with no line wrapping and update the ANDROID_KEYSTORE_BASE64 secret:"
              echo "  base64 -w 0 crypto-p2p.jks | pbcopy   # or > keystore.b64"
              exit 1
              ;;
          esac
          echo "--- Aliases in keystore ---"
          if ! keytool -list -keystore android/app/crypto-p2p.jks -storepass "$ANDROID_KEYSTORE_PASSWORD" 2>&1; then
            echo "ERROR: Could not list keystore. The ANDROID_KEYSTORE_PASSWORD secret is wrong."
            exit 1
          fi
          echo "--- Verifying alias '$ANDROID_KEY_ALIAS' ---"
          if ! keytool -list -keystore android/app/crypto-p2p.jks \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              -alias "$ANDROID_KEY_ALIAS" 2>&1; then
            echo "ERROR: Alias '$ANDROID_KEY_ALIAS' not found in keystore (see aliases above)."
            echo "Update the ANDROID_KEY_ALIAS secret to match."
            exit 1
          fi
          echo "Keystore verified successfully."

      - name: Build signed APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'crypto-p2p' }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          export JAVA_HOME="${JAVA_HOME_17_X64:-$JAVA_HOME}"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          javac -version
          ./gradlew --version
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/crypto-p2p.jks \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Copy APK to public/downloads
        run: |
          mkdir -p public/downloads
          cp android/app/build/outputs/apk/release/app-release.apk public/downloads/crypto-p2p.apk

      - name: Commit APK back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/downloads/crypto-p2p.apk
          git diff --staged --quiet && echo "No APK changes" && exit 0
          git commit -m "🤖 Auto-build: update APK"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "Push failed, retrying ($i)..."
            sleep 3
          done
          echo "Push failed after retries" && exit 1
