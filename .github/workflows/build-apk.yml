name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/downloads/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Verify Node.js version
        run: |
          node --version
          npm --version
          node -e "const major = Number(process.versions.node.split('.')[0]); if (major < 22) throw new Error('Node 22+ is required for Capacitor');"

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verify Java version
        run: |
          java -version
          javac -version
          javac -version 2>&1 | grep -q "21\." || { echo "JDK 21 is required for Capacitor Android"; exit 1; }

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: |
          node --version
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/crypto-p2p.jks

      - name: Build signed APK
        working-directory: android
        run: |
          export JAVA_HOME="${JAVA_HOME_21_X64:-$JAVA_HOME}"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          javac -version
          ./gradlew --version
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/crypto-p2p.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Copy APK to public/downloads
        run: |
          mkdir -p public/downloads
          cp android/app/build/outputs/apk/release/app-release.apk public/downloads/crypto-p2p.apk

      - name: Commit APK back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/downloads/crypto-p2p.apk
          git diff --staged --quiet || git commit -m "🤖 Auto-build: update APK"
          git push
