name: Generate Keystore (Run Once)

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Password for the keystore (remember this!)'
        required: true
        default: 'cryptop2p2026'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore crypto-p2p.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias crypto-p2p \
            -storepass "${{ inputs.keystore_password }}" \
            -keypass "${{ inputs.keystore_password }}" \
            -dname "CN=Crypto P2P, OU=Mobile, O=CryptoP2P, L=City, ST=State, C=US"

      - name: Convert to base64
        run: base64 -w 0 crypto-p2p.jks > keystore.base64.txt

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystore-files
          path: |
            crypto-p2p.jks
            keystore.base64.txt
          retention-days: 1
